name: Build & Package

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: "*.dmg"
            label: macOS
          - os: windows-latest
            artifact: "*.exe"
            label: Windows
          - os: ubuntu-latest
            artifact: "*.AppImage"
            label: Linux

    runs-on: ${{ matrix.os }}
    name: Package (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Debug - Check vite installation
        run: |
          ls -la node_modules/ | head -20
          test -d node_modules/vite && echo "vite package exists" || echo "vite package missing"
          npm list vite || echo "vite not in npm list"

      - name: Build & package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevSheets-${{ matrix.label }}-${{ github.sha }}
          path: release/${{ matrix.artifact }}
          if-no-files-found: warn
          retention-days: 30
