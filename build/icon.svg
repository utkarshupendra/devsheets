<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c2a3a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Inner border -->
  <rect x="2" y="2" width="508" height="508" rx="110" stroke="white" stroke-opacity="0.06" stroke-width="4"/>
  <!-- Header row highlight -->
  <rect x="64" y="64" width="384" height="128" rx="24" fill="#58a6ff" fill-opacity="0.18"/>
  <!-- >_ terminal prompt -->
  <text x="96" y="162" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="96" font-weight="700" fill="#58a6ff" letter-spacing="4">&gt;_</text>
  <!-- Row separator lines -->
  <line x1="64" y1="192" x2="448" y2="192" stroke="white" stroke-opacity="0.1" stroke-width="2"/>
  <line x1="64" y1="288" x2="448" y2="288" stroke="white" stroke-opacity="0.07" stroke-width="2"/>
  <line x1="64" y1="384" x2="448" y2="384" stroke="white" stroke-opacity="0.07" stroke-width="2"/>
  <!-- Data bar row 1 -->
  <rect x="96" y="224" width="224" height="28" rx="14" fill="white" fill-opacity="0.55"/>
  <!-- Accent cell row 1 -->
  <rect x="348" y="220" width="100" height="36" rx="18" fill="#58a6ff" fill-opacity="0.85"/>
  <!-- Data bar row 2 -->
  <rect x="96" y="320" width="160" height="28" rx="14" fill="white" fill-opacity="0.35"/>
  <!-- Data bar row 2 right -->
  <rect x="276" y="320" width="80" height="28" rx="14" fill="white" fill-opacity="0.2"/>
  <!-- Data bar row 3 -->
  <rect x="96" y="416" width="272" height="28" rx="14" fill="white" fill-opacity="0.25"/>
</svg>
